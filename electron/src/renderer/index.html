<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>隆小虾 Agent OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1a1815;
      --bg-sidebar: #201d18;
      --bg-input: #2a2520;
      --bg-code: #1e1b16;
      --bg-user: #2a2520;
      --bg-tool: #1e2520;
      --text: #e8e6e3;
      --text-dim: #8a8680;
      --text-label: #b1ada1;
      --accent: #C15F3C;
      --accent-hover: #d4714e;
      --border: #332e28;
      --border-light: #443e36;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    #app { height: 100vh; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* Markdown styles */
    .md-content h1, .md-content h2, .md-content h3 { margin: 16px 0 8px; font-weight: 600; }
    .md-content h1 { font-size: 1.4em; }
    .md-content h2 { font-size: 1.2em; }
    .md-content h3 { font-size: 1.05em; }
    .md-content p { margin: 6px 0; line-height: 1.6; }
    .md-content ul, .md-content ol { margin: 6px 0; padding-left: 24px; }
    .md-content li { margin: 3px 0; line-height: 1.5; }
    .md-content strong { color: #fff; }
    .md-content em { color: var(--text-label); }
    .md-content a { color: var(--accent); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-label);
    }
    .md-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .md-content th, .md-content td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
      font-size: 0.9em;
    }
    .md-content th { background: var(--bg-code); font-weight: 600; }

    /* Inline code */
    .md-content code:not(pre code) {
      background: var(--bg-code);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    /* Code blocks */
    .md-content pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
    }
    .md-content pre code {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85em;
      line-height: 1.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
