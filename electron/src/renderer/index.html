<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Longclaw Agent OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --lc-paper: #F7F2E8;
      --lc-stone: #E7DDCC;
      --lc-panel: #F0E6D7;
      --lc-ink: #171A1F;
      --lc-slate: #2C3440;
      --lc-copper: #B8643B;
      --lc-border: rgba(23, 26, 31, 0.12);
      --lc-border-strong: rgba(23, 26, 31, 0.2);
      --font-ui: "Instrument Sans", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      --font-display: "Instrument Serif", "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      --font-mono: "IBM Plex Mono", "SFMono-Regular", "Menlo", "Consolas", monospace;
    }
    body {
      font-family: var(--font-ui);
      background: var(--lc-paper);
      color: var(--lc-ink);
      height: 100vh;
      overflow: hidden;
    }
    #app { height: 100vh; }

    /* Markdown styles */
    .md-content h1, .md-content h2, .md-content h3 {
      margin: 16px 0 8px;
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--lc-ink);
    }
    .md-content h1 { font-size: 1.45em; }
    .md-content h2 { font-size: 1.2em; }
    .md-content h3 { font-size: 1.05em; }
    .md-content p { margin: 6px 0; line-height: 1.6; }
    .md-content ul, .md-content ol { margin: 6px 0; padding-left: 24px; }
    .md-content li { margin: 3px 0; line-height: 1.5; }
    .md-content strong { color: var(--lc-ink); }
    .md-content em { color: #67717D; }
    .md-content a { color: var(--lc-copper); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content blockquote {
      border-left: 3px solid var(--lc-copper);
      padding-left: 12px;
      margin: 8px 0;
      color: #586472;
    }
    .md-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .md-content th, .md-content td {
      border: 1px solid var(--lc-border);
      padding: 6px 10px;
      text-align: left;
      font-size: 0.9em;
    }
    .md-content th { background: var(--lc-panel); font-weight: 600; }

    /* Inline code */
    .md-content code:not(pre code) {
      background: var(--lc-panel);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: var(--font-mono);
    }

    /* Code blocks */
    .md-content pre {
      background: #1D232C;
      border: 1px solid rgba(247, 242, 232, 0.08);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
      color: #F6EFE4;
    }
    .md-content pre code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      line-height: 1.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--lc-border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(23, 26, 31, 0.3); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
